# Web Audit Scanner — Debian container packed with security tools to audit websites you own.
# The container installs the tools at startup and stays alive so you can run scans via
# the scanner.sh script mounted at /app/tools/scanner.sh (see readme.md for usage).

services:
  web_audit_scanner_d13:
    container_name: web_audit_scanner_d13
    image: debian:13-slim
    volumes:
      - ./volume_mounts/app/tools:/app/tools:ro
      - ./volume_mounts/app/logs:/app/logs:rw
    #this bellow drops ALL container capabilities
    cap_drop:
      - ALL
    #this bellow reallows the minimum of the container capabilities
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - NET_RAW
      - SETGID
      - SETUID
    #allowing the bellow will add unecessary permissions to the container
    #you may reallow only if necessary
    #  - SETFCAP
    #  - SETPCAP
    #  - SYS_CHROOT
    #  - AUDIT_WRITE
    #  - FSETID
    #  - KILL
    #  - MKNOD
    #  - NET_BIND_SERVICE
    environment:
      - TARGET_URL=${TARGET_URL:-}
      - DEBIAN_FRONTEND=noninteractive
    command: >
      sh -c '

      echo "updating the system" &&
      apt update -y &&
      apt upgrade -y &&

      echo "massive install of sec softwares" &&
      apt install -y curl ;
      apt install -y debsecan ;
      apt install -y dirb ;
      apt install -y dnsrecon ;
      apt install -y dnsutils ;
      apt install -y ffuf ;
      apt install -y gitleaks ;
      apt install -y hydra ;
      apt install -y lynis ;
      apt install -y masscan ;
      apt install -y nikto ;
      apt install -y nmap ;
      apt install -y sqlmap ;
      apt install -y sslscan ;
      apt install -y testssl.sh ;
      apt install -y wafw00f ;
      apt install -y wapiti ;
      apt install -y whatweb ;
      apt install -y whois ;
      apt install -y wget ;
      apt install -y wpscan ;

      echo "keeps the container running" &&
      sleep infinity
      '
